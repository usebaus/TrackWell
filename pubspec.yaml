name: trackwell
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: 3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  provider: ^6.1.2
  shared_preferences: ^2.5.5
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/trackwell_icon.png"
  adaptive_icon_background: "#01696f"
  adaptive_icon_foreground: "assets/icon/trackwell_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/trackwell_icon.png